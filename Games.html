<!DOCTYPE html>
<html>
<head>
<title>Healthy Life Simulator</title>
<link rel="stylesheet" href="foodsubway.css">
<script src="script.js"></script>
</head>

<body>

<h1>Healthy Life Simulator</h1>

<div id="stats">
<p id="day">Day: 1</p>
<p id="health">Health: 100</p>
<p id="energy">Energy: 100</p>
<p id="happiness">Happiness: 100</p>
</div>

<div id="actions">

<button onclick="eatHealthy()">🍎 Eat Healthy</button>
<button onclick="eatJunk()">🍔 Eat Junk Food</button>
<button onclick="exercise()">🏃 Exercise</button>
<button onclick="sleep()">😴 Sleep</button>
<button onclick="internet()">📱 Use Internet</button>

</div>

<div id="message"></div>

<div id="gameOver"></div>

<script src="script.js"></script>

</body>
</html>
