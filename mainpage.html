<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Web Design Layout</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial;
  padding: 10px;
  background-image: url(background.jpg);
  background-size: cover;
}


/* Header/Blog Title */
.header {
  padding: 55px;
  text-align: center;
  background-image: url(back.png);
  background-position: top;
  background-repeat: no-repeat;
  background-size: 10%;
}


.header h1 {
  font-size: 50px;
}

/* Style the top navigation bar */
.topnav {
  overflow: hidden;
  background-color: #333;
}

/* Style the topnav links */
.topnav a {
  float: left;
  display: block;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
}

/* Change color on hover */
.topnav a:hover {
  color: black;
}

/* Create two unequal columns that floats next to each other */
/* Left column */
.leftcolumn {   
  float: left;
  width: 100%;
  text-align: center;
}

/* Right column */
.rightcolumn {
  float: left;
  width: 0%;
  background-color: #f1f1f1;
  padding-left: 20px;
}

/* Fake image */
.fakeimg {
  background-color: #aaa;
  width: 100%;
  padding: 20px;
}

/* Add a card effect for articles */
.card {
  padding: 20px;
  margin-top: 20px;
}

/* Clear floats after the columns */
.row:after {
  content: "";
  display: table;
  clear: both;
}

/* Footer */
.footer {
  padding: 20px;
  text-align: center;
  margin-top: 20px;
  color: blue;
}

/* Responsive layout - when the screen is less than 800px wide, make the two columns stack on top of each other instead of next to each other */

@media screen and (max-width: 800px) {
  .leftcolumn, .rightcolumn {   
    width: 100%;
    padding: 0;
  }
}



/* Responsive layout - when the screen is less than 400px wide, make the navigation links stack on top of each other instead of next to each other */

@media screen and (max-width: 400px) {
  .topnav a {
    float: none;
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="header">
  <br><br><br>
  <h2>LAGUNA COLLEGE OF BUSINESS AND ARTS</h2>
  <p style="background-color: whitesmoke;">Presenting a Home Economic strand</p>
  <br>
  <p>Welcome!</p>
  <br>
  <h1>LCBA STUDENT!</h1>
</div>


<div class="topnav">
  <a href="About_LCBA.html">LCBA</a>
  <a href="AboutTheStrand.html">TVL-HE</a>
  <a href="ProductImage.html">Image Gallery</a>
  <a href="ProductVideo.html">Video Gallery</a>
   <a href="GamesHestrand.html" style="float:right">Games</a>
</div>


<div class="footer">
  <h5>Laguna College of Business and Arts</h5>
</div>

</body>
</html>
